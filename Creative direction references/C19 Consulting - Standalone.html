document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"52fdd1c3-e400-4fd9-91dd-b275237982ca\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet data-dc-atomics=\"\">\n<style>\n@keyframes c19fade{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }\nbody{ margin:0; background:oklch(100% 0 0); }\n<\u002Fstyle>\n<script src=\"84d45b22-c8f3-4033-af11-bb02f31a081c\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:oklch(12% 0 0);mix-blend-mode:difference;pointer-events:none;z-index:999;transform:translate(-50%,-50%);transition:width .25s ease,height .25s ease;\" ref=\"{{ cursorRef }}\"><\u002Fdiv>\n\n<div style=\"position:fixed;z-index:60;width:260px;aspect-ratio:3/4;pointer-events:none;opacity:0;transition:opacity .35s ease;transform:translate(-50%,-50%);background:linear-gradient(165deg, oklch(97% 0 0) 0%, oklch(91% 0 0) 100%);display:flex;align-items:flex-end;padding:20px;\" ref=\"{{ previewRef }}\">\n  <span ref=\"{{ previewLabelRef }}\" style=\"font:12px/1.4 -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:.08em;color:oklch(70% 0.01 80);\"><\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"min-height:100vh;background:oklch(100% 0 0);color:oklch(12% 0 0);font-family:'Times New Roman',Times,serif;position:relative;overflow-x:hidden;\" data-screen-label=\"{{ page }}\">\n\n  <!-- HEADER -->\n  <header ref=\"{{ headerRef }}\" style=\"position:fixed;top:0;left:0;right:0;z-index:40;background:transparent;border-bottom:1px solid transparent;transition:background .35s ease,border-color .35s ease;\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:26px 44px 22px;display:flex;justify-content:space-between;align-items:baseline;\">\n      <a href=\"#\" onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:14px;text-decoration:none;cursor:pointer;\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">\n        <img src=\"5b08fd23-c624-4915-978f-f7bd9c1a544c\" alt=\"C19 Consulting\" style=\"height:36px;width:auto;display:block;filter:grayscale(1) contrast(1.15) brightness(0.9);\">\n        <span style=\"font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-style:normal;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:oklch(48% 0 0);\">Consulting — Paris<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display:flex;gap:32px;align-items:baseline;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n        <a href=\"#\" onclick=\"{{ goTo.home }}\" style=\"{{ navStyle.home }}\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">Index<\u002Fa>\n        <a href=\"#\" onclick=\"{{ goTo.information }}\" style=\"{{ navStyle.information }}\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">Information<\u002Fa>\n        <a href=\"#\" onclick=\"{{ goTo.work }}\" style=\"{{ navStyle.work }}\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">Work<\u002Fa>\n        <a href=\"#\" onclick=\"{{ goTo.writing }}\" style=\"{{ navStyle.writing }}\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">Writing<\u002Fa>\n        <a href=\"mailto:hello@c19consulting.com\" style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:oklch(12% 0 0);text-decoration:none;\" onmouseenter=\"{{ growCursor }}\" onmouseleave=\"{{ shrinkCursor }}\">Contact<\u002Fa>\n        <span style=\"font-size:10px;letter-spacing:.14em;color:oklch(78% 0 0);\"><b style=\"font-weight:500;color:oklch(12% 0 0);\">EN<\u002Fb> — FR<\u002Fspan>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n\n  <!-- ============ HOME ============ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <section>\n      <div style=\"display:grid;grid-templ e strategy, art direction, production, and editorial projects. The practice is grounded in doctoral research on the fashion design gesture (Université Paris 1 Panthéon-Sorbonne / Università di Bologna), and treats every engagement with the method of the archive: close attention, precise description, care.<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.75;margin:0;\">Work is conducted in English and French, from Paris and wherever the project requires — most recently Venice, Milan, New York, and Tokyo.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span style=\"display:block;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding-bottom:14px;border-bottom:1px solid oklch(12% 0 0);margin-bottom:20px;\">Selected Clients<\u002Fspan>\n          <ul style=\"list-style:none;margin:0;padding:0;\">\n            <sc-for list=\"{{ clients }}\" as=\"c\" hint-placeholder-count=\"8\">\n              <li style=\"padding:11px 0;border-bottom:1px solid oklch(88% 0 0);font-size:14px;\">{{ c }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid oklch(12% 0 0);\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:0 44px;\">\n      <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;padding:48px 0 20px;\">\n        <div>\n          <span style=\"display:block;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:oklch(48% 0 0);margin-bottom:14px;\">C19 Consulting<\u002Fspan>\n          <p style=\"font-size:13px;line-height:1.7;margin:0;\">Creative strategy, art direction, production,<br>and editorial curation — Paris.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span styl -system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10.5px;color:oklch(68% 0 0);letter-spacing:.06em;display:flex;justify-content:space-between;\">\n        <span>© C19 Consulting, 2026<\u002Fspan>\n        <span>Paris<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nconst COLLECTION = {\n  'p-venice': { fig:'Fig. 02', title:'Venice Biennale Inspiration Trip', client:'CREO — PUIG', year:'2026', services:'Production & Coordination, Creative Strategy', location:'Venice, Italy', status:'In production', desc:'A three-day inspiration trip conceived for senior creatives around the Venice Biennale — programming, guest experience, and the full production apparatus, from agendas to the smallest printed piece.' },\n  'p-grandpalais': { fig:'Fig. 03', title:'Inspiration Days, Grand Palais', client:'CREO — PUIG', year:'2026', services:'Creative Strategy, Production', location:'Paris, France', status:'In production', desc:'A series of Inspiration Day events staged at the Grand Palais for Art Basel Paris and Paris Photo — creative direction of the programme, communications, and event materials.' },\n  'p-music': { fig:'Fig. 04', title:'Music Culture Sessions', client:'PUIG', year:'2026', services:'Creative Strategy', location:'Paris, Barcelona, London', status:'Concept', desc:'A listening-bar event series across three cities, developed with independent partners — a study in how sound cultures can carry a house\\u2019s creative programme.' },\n  'p-form': { fig:'Fig. 05', title:'Archive Intelligence Platform', client:'FORM.Space', year:'2025—', services:'Editorial Curation, Brand Management', location:'Paris, France', status:'Ongoing', desc:'Archive lead and platform architecture for a fashion archive intelligence platform — taxonomy, editorial programming, and the frameworks through which a collection becomes knowledge.' },\n  'p-academy': { fig:'Fig. 06', title:'FORM Academy', client:'FORM.Space', year:'2025', services:'Editorial Curation', location:'Paris, France', status:'Ongoing', desc:'A video series combining biographical analysis with close readings of fashion collections — designers read through their gestures, one collection at a time.' },\n  'p-milan': { fig:'Fig. 07', title:'Milan Design Week Editorial', client:'CREO — PUIG × FORMÆ Magazine', year:'2026', services:'Editorial Curation', location:'Milan, Italy', status:'Published', desc:'Co-curated editorial coverage of Milan Design Week with FORMÆ Magazine — commissioned articles and client communications for a design-literate audience.' },\n  'p-carhartt': { fig:'Fig. 08', title:'French Voice Programme', client:'Carhartt WIP', year:'2025', services:'Marketing & Storytelling', location:'Paris, France', status:'Delivered', desc:'A large-scale French product copywriting programme — 135 pieces — with iterative calibration of the brand\\u2019s voice across the collection.' },\n  'p-cartier': { fig:'Fig. 09', title:'Cartier Special, Cover Production', client:'Harper\\u2019s Bazaar Turkey', year:'2025', services:'Production & Coordination', location:'Paris, France', status:'Delivered', desc:'Line production for a Cartier Special cover shoot — pre-production, call sheets, studio coordination, and the quiet choreography that makes a cover possible.' },\n  'p-ashaalia': { fig:'Fig. 10', title:'Brand Audit & Product Language', client:'Ashaalia', year:'2025—', services:'Brand Management, Marketing & Wholesale', location:'Melbourne, Australia', status:'Ongoing', desc:'A comprehensive brand and website audit for a hand-embellished womenswear house, followed by a full product copy rewrite, inventory architecture, and wholesale outreach strategy.' },\n  'p-middaia': { fig:'Fig. 11', title:'Trunk Show Press Campaign', client:'Middaia', year:'2026', services:'Marketing & Storytelling, Wholesale', location:'New York, United States', status:'Delivered', desc:'Press campaign and contact architecture for a New York trunk show — a jewellery house introduced to a new city with precision.' },\n  'p-unhome': { fig:'Fig. 12', title:'UNHOME, Paris Edition', client:'Unhome', year:'2026', services:'Art Direction, Editorial Curation', location:'Paris, France', status:'In production', desc:'Art direction and editorial support for a nomadic design retail concept — from manifesto to event, design for the real home.' }\n};\n\nconst SERVICES = [\n  { num:'I', name:'Creative Strategy Consulting', desc:'Positioning, cultural programming, long-term creative vision.' },\n  { num:'II', name:'Art Direction Consulting', desc:'Visual systems, typographic identities, image direction.' },\n  { num:'III', name:'Marketing, Storytelling & Wholesale', desc:'Product language, brand narrative, wholesale strategy.' },\n  { num:'IV', name:'Brand Management', desc:'Audits, inventory architecture, operational frameworks.' },\n  { num:'V', name:'Production & Celebrity Coordination', desc:'Shoots, VIP trips, cultural events, guest experience.' },\n  { num:'VI', name:'Editorial Curation', desc:'Publications, partnerships, archive-driven content.' }\n];\n\nconst WRITING = [\n  { num:'2026', year:'2026', title:'Gestures and Temporalities of Fashion', venue:'Study day — Institut Français de la Mode, co-organiser' },\n  { num:'2024—', year:'2024—', title:'On the Sustainability of the Fashion Design Gesture', venue:'Doctoral research — Paris 1 Panthéon-Sorbonne / Università di Bologna' },\n  { num:'2025', year:'2025', title:'Boro — Repair as Embodied Knowledge', venue:'IFFTI Conference — RMIT University Vietnam' },\n  { num:'2025—', year:'2025—', title:'Conversations', venue:'Interview series — designers, archivists, makers' },\n  { num:'2024—', year:'2024—', title:'Thoughts on Fashion', venue:'Essays — theory, craft, repair cultures' },\n  { num:'2023—', year:'2023—', title:'FERAL — Selected Writings', venue:'Independent editorial platform' }\n];\n\nconst CLIENTS = ['PUIG — CREO','FORM.Space','Carhartt WIP',\"Harper's Bazaar\",'Ashaalia','Middaia','Unhome','FORMÆ Magazine'];\n\nconst FEATURED_SLUGS = ['p-venice','p-grandpalais','p-carhartt','p-cartier'];\n\nclass Component extends DCLogic {\n  state = { page:'home', slug:null };\n\n  componentDidMount(){\n    const cursor = this.cursorEl;\n    let px = window.innerWidth/2, py = window.innerHeight/2, cx = px, cy = py;\n    this._mouseHandler = e => { px = e.clientX; py = e.clientY; };\n    window.addEventListener('mousemove', this._mouseHandler);\n    const follow = () => {\n      cx += (px - cx) * 0.16; cy += (py - cy) * 0.16;\n      if (cursor) cursor.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;\n      if (this.previewEl) this.previewEl.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;\n      this._raf = requestAnimationFrame(follow);\n    };\n    follow();\n\n    this._scrollHandler = () => {\n      if (!this.headerEl) return;\n      const isHome = this.state.page === 'home';\n      const solid = !isHome || window.scrollY > 40;\n      this.headerEl.style.background = solid ? 'oklch(100% 0 0)' : 'transparent';\n      this.headerEl.style.borderBottomColor = solid ? 'oklch(88% 0 0)' : 'transparent';\n    };\n    window.addEventListener('scroll', this._scrollHandler, { passive:true });\n    this._scrollHandler();\n\n    this._observer = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (en.isIntersecting){\n          en.target.style.opacity = '1';\n          en.target.style.transform = 'translateY(0)';\n        }\n      });\n    }, { threshold:0.1 });\n    this._observeRevealEls();\n  }\n\n  _observeRevealEls(){\n    setTimeout(() => {\n      document.querySelectorAll('[data-reveal]').forEach(el => this._observer && this._observer.observe(el));\n    }, 50);\n  }\n\n  componentDidUpdate(prevProps, prevState){\n    if (prevState.page !== this.state.page){\n      window.scrollTo(0,0);\n      this._scrollHandler && this._scrollHandler();\n      this._observeRevealEls();\n    }\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('mousemove', this._mouseHandler);\n    window.removeEventListener('scroll', this._scrollHandler);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._observer) this._observer.disconnect();\n  }\n\n  growCursor = () => { if (this.cursorEl){ this.cursorEl.style.width='34px'; this.cursorEl.style.height='34px'; } };\n  shrinkCursor = () => { if (this.cursorEl){ this.cursorEl.style.width='9px'; this.cursorEl.style.height='9px'; } };\n  shrinkPreview = () => { if (this.previewEl) this.previewEl.style.opacity = '0'; this.shrinkCursor(); };\n\n  go(page, slug){\n    return (e) => { if (e) e.preventDefault(); this.setState({ page, slug: slug || null }); };\n  }\n\n  makeProjectEntry(slug){\n    const p = COLLECTION[slug];\n    const self = this;\n    return {\n      ...p, slug,\n      open: (e) => { if (e) e.preventDefault(); self.setState({ page:'detail', slug }); },\n      hoverIn: () => {\n        self.growCursor();\n        if (self.previewEl && self.previewLabelEl){\n          self.previewLabelEl.textContent = p.fig;\n          self.previewEl.style.opacity = '1';\n        }\n      }\n    };\n  }\n\n  renderVals(){\n    const page = this.state.page;\n    const allProjects = Object.keys(COLLECTION).map(slug => this.makeProjectEntry(slug));\n    const featured = FEATURED_SLUGS.map(slug => this.makeProjectEntry(slug));\n    const navStyleFor = (key) => {\n      const active = page === key || (page === 'detail' && key === 'work') || (page === 'home' && key === 'home');\n      return `font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:oklch(12% 0 0);opacity:${active ? 1 : 0.6};border-bottom:${active ? '1px solid oklch(12% 0 0)' : '1px solid transparent'};padding-bottom:2px;`;\n    };\n\n    return {\n      page,\n      isHome: page === 'home',\n      isWork: page === 'work',\n      isDetail: page === 'detail',\n      isWriting: page === 'writing',\n      isInformation: page === 'information',\n      cursorRef: (el) => { this.cursorEl = el; },\n      previewRef: (el) => { this.previewEl = el; },\n      previewLabelRef: (el) => { this.previewLabelEl = el; },\n      headerRef: (el) => { this.headerEl = el; },\n      goHome: this.go('home'),\n      goTo: {\n        home: this.go('home'),\n        information: this.go('information'),\n        work: this.go('work'),\n        writing: this.go('writing')\n      },\n      navStyle: {\n        home: navStyleFor('home'),\n        information: navStyleFor('information'),\n        work: navStyleFor('work'),\n        writing: navStyleFor('writing')\n      },\n      growCursor: this.growCursor,\n      shrinkCursor: this.shrinkCursor,\n      shrinkPreview: this.shrinkPreview,\n      featured,\n      allProjects,\n      current: this.state.slug ? COLLECTION[this.state.slug] : { fig:'', title:'', client:'', year:'', services:'', location:'', status:'', desc:'' },\n      services: SERVICES,\n      writing: WRITING,\n      writingPreview: WRITING.slice(0,3),\n      clients: CLIENTS\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
